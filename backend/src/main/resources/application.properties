# Application Configuration
spring.application.name=instagram-analytics-dashboard
server.port=${SERVER_PORT:8080}

# Active profile (set SPRING_PROFILES_ACTIVE=prod in production)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# PostgreSQL Database Configuration (Neon-compatible via env vars)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/post}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000

# Session Configuration
spring.session.store-type=redis
spring.session.redis.namespace=instagram-analytics:session

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-min-256-bits-please-rotate}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:600000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.issuer=${JWT_ISSUER:instagram-analytics}
jwt.audience=${JWT_AUDIENCE:instagram-analytics-client}

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/google/callback

# Logging Configuration
logging.level.root=INFO
logging.level.com.socialmedia=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:DEBUG}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Logging Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log File Configuration
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-executor-

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# WebSocket Configuration
websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Monitoring Scheduler Configuration
monitoring.scheduler.interval=900000
monitoring.scheduler.max-concurrent=5

# Graph API Configuration (per-account credentials are stored in the DB - Issue 7)
graph-api.base-url=${GRAPH_API_BASE_URL:https://graph.instagram.com}
graph-api.retry.max-attempts=3

# Credential Encryption (AES-256-GCM key, Base64-encoded 32 bytes) - Issue 5
credential.encryption.key=${CREDENTIAL_ENCRYPTION_KEY:}

# Request Size Limits - Issue 4
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB

# Notification Configuration
notification.threshold.min=0
notification.threshold.max=1000

# Cache Configuration
cache.profile.ttl=300

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.instagram.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.instagram.wait-duration-in-open-state=60000
resilience4j.circuitbreaker.instances.instagram.sliding-window-size=10

# Resilience4j Retry
resilience4j.retry.instances.database.max-attempts=3
resilience4j.retry.instances.database.wait-duration=1000
